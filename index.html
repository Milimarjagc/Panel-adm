<!DOCTYPE html>
<html>
<head>
    <title>Test Conexión</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body>
    <button id="connect">Conectar</button>
    <p id="status">No conectado</p>
    <script>
        document.getElementById('connect').onclick = async () => {
            if (!window.ethereum) {
                document.getElementById('status').innerText = 'Instala MetaMask';
                return;
            }
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const address = await signer.getAddress();
                document.getElementById('status').innerText = 'Conectado: ' + address;
                
                // Intentar leer el contrato de Membresía
                const contractAddr = "0x35425E6416f799C30938cBc159523B43C1c358B2";
                const abi = ["function owner() view returns (address)"];
                const contract = new ethers.Contract(contractAddr, abi, provider);
                const owner = await contract.owner();
                console.log('Owner del contrato:', owner);
            } catch (e) {
                document.getElementById('status').innerText = 'Error: ' + e.message;
                console.error(e);
            }
        };
    </script>
</body>
</html>
